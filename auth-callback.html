<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Completing Sign In - The Nursing Collective</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
          --navy:        #0d1b2a;
          --navy-2:      #162032;
          --navy-3:      #1e2d3e;
          --teal:        #0fbcad;
          --teal-dim:    #0a9086;
          --red:         #e05252;
          --text:        #e8edf2;
          --text-dim:    #8a9bb0;
          --text-dimmer: #5f7085;
          --border:      rgba(255,255,255,0.07);
          --border-mid:  rgba(255,255,255,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--navy);
            color: var(--text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Background grid texture */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(rgba(15,188,173,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(15,188,173,0.03) 1px, transparent 1px);
          background-size: 40px 40px;
          pointer-events: none;
          z-index: 0;
        }

        .callback-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .callback-card {
            background: var(--navy-2);
            border: 0.5px solid var(--border-mid);
            border-radius: 14px;
            padding: 48px 40px;
            text-align: center;
            max-width: 440px;
            width: 100%;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .callback-logo {
            width: 180px;
            margin: 0 auto 36px;
        }

        .callback-logo img {
            width: 100%;
            height: auto;
        }

        /* Spinner */
        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 56px;
            margin-bottom: 28px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 2px solid var(--border-mid);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .callback-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 10px;
        }

        .callback-message {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Success icon */
        .success-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            background: rgba(61,189,122,0.12);
            border: 0.5px solid rgba(61,189,122,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeUp 0.3s ease;
        }

        .success-icon i {
            font-size: 24px;
            color: #3dbd7a;
        }

        /* Error icon */
        .error-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            background: rgba(224,82,82,0.12);
            border: 0.5px solid rgba(224,82,82,0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeUp 0.3s ease;
        }

        .error-icon i {
            font-size: 24px;
            color: var(--red);
        }

        /* Buttons */
        .error-actions {
            margin-top: 24px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            font-size: 13px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.15s;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--teal);
            color: var(--navy);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--teal-dim);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dim);
            border: 0.5px solid var(--border-mid);
        }

        .btn-secondary:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--text);
        }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .callback-card { padding: 36px 28px; }
            .callback-title { font-size: 20px; }
            .error-actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
    <script src="lockscreen.js"></script>
    <script src="beta-banner.js"></script>
</head>
<body>
    <div class="callback-container">
        <div class="callback-card">
            <div class="callback-logo">
                <img src="assets/images/the-nursing-collective-logo.svg" alt="The Nursing Collective">
            </div>

            <div id="loading-state">
                <div class="spinner-container">
                    <div class="spinner"></div>
                </div>
                <h1 class="callback-title">Completing Sign In</h1>
                <p class="callback-message">Please wait while we securely set up your account...</p>
            </div>

            <div id="error-state" class="hidden">
                <div class="error-icon">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <h1 class="callback-title">Sign In Failed</h1>
                <p class="callback-message" id="error-message">
                    We couldn't complete your sign in. Please try again.
                </p>
                <div class="error-actions">
                    <a href="login.html" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i>
                        Try Again
                    </a>
                    <a href="index.html" class="btn btn-secondary">
                        <i class="fas fa-home"></i>
                        Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- API Service for OAuth -->
    <script src="api-service.js"></script>
    <script src="auth-callback.js?v=4"></script>
</body>
</html>
