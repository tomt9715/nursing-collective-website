<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Dashboard - The Nursing Collective</title>
    <meta http-equiv="refresh" content="0;url=dashboard.html">
    <style>
        :root {
          --navy: #0d1b2a;
          --teal: #0fbcad;
          --text-dim: #8a9bb0;
          --border-mid: rgba(255,255,255,0.12);
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--navy);
            color: var(--text-dim);
        }
        .redirect-message {
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
        .redirect-message p { margin-bottom: 8px; }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-mid);
            border-top-color: var(--teal);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        a { color: var(--teal); }
    </style>
    <script src="lockscreen.js"></script>
    <script src="beta-banner.js"></script>
</head>
<body>
    <div class="redirect-message">
        <div class="spinner"></div>
        <p>Redirecting to dashboard...</p>
        <p>If you are not redirected, <a href="dashboard.html">click here</a>.</p>
    </div>
</body>
</html>
