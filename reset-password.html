    <!-- Reset Password Page -->
    <main id="main-content">
    <section class="auth-page">
        <div class="container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="eyebrow">Password Reset</div>
                    <h1>Create New Password</h1>
                    <p class="auth-subtitle">Choose a strong password for your account</p>
                </div>

                <form class="email-auth" id="reset-password-form">
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" placeholder="Create secure password (min. 8 characters)" required minlength="8">
                        <span class="field-icon"><i class="fas fa-lock"></i></span>
                        <div class="password-strength" id="password-strength">
                            <div class="strength-bar"></div>
                            <span class="strength-text"></span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirm-new-password">Confirm Password</label>
                        <input type="password" id="confirm-new-password" placeholder="Confirm your new password" required>
                        <span class="field-icon"><i class="fas fa-lock"></i></span>
                    </div>

                    <div id="reset-message" class="hidden"></div>

                    <button type="submit" class="auth-btn primary full-width" id="reset-submit-btn">
                        <i class="fas fa-check-circle"></i>
                        <span>Reset Password</span>
                    </button>
                </form>

                <div class="auth-footer" style="margin-top:20px;text-align:center;">
                    <p class="toggle-mode" style="font-size:14px;color:var(--text-dim);">
                        Remember your password? <a href="login.html">Sign In</a>
                    </p>
                    <div class="auth-links" style="margin-top:12px;">
                        <a href="privacy.html">Privacy Policy</a>
                        <span class="divider">&#183;</span>
                        <a href="terms.html">Terms of Service</a>
                    </div>
                </div>
            </div>

            <!-- Trust Badges -->

                    <span>Secure &amp; Encrypted</span>
                </div>
                <div class="trust-badge">

                    <span>Privacy Protected</span>
                </div>
                <div class="trust-badge">

                    <span>FERPA Compliant</span>
